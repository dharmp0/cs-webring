<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Webring – Redirecting…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #fafafa; color: #333;
    }
    .msg { text-align: center; max-width: 420px; padding: 2rem; }
    .msg h2 { margin-bottom: 0.75rem; font-size: 1.25rem; }
    .msg p { margin-bottom: 0.5rem; line-height: 1.5; }
    .msg code { background: #e5e7eb; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    .msg a { color: #6366f1; text-decoration: none; }
    .msg a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="msg" id="msg">Redirecting…</div>
  <script>
    (async function () {
      var params = new URLSearchParams(window.location.search);
      var site = params.get('site');
      var nav = params.get('nav');
      var msgEl = document.getElementById('msg');

      function showError(text) {
        msgEl.innerHTML =
          '<h2>CS Webring</h2><p>' + text + '</p>' +
          '<p style="margin-top:1rem"><a href="/">\u2190 Back to webring</a></p>';
      }

      if (!site || !nav) {
        showError('Missing <code>site</code> or <code>nav</code> parameter.');
        return;
      }

      var siteHostname;
      try {
        siteHostname = new URL(site).hostname;
      } catch (e) {
        showError('Invalid <code>site</code> URL.');
        return;
      }

      if (['prev', 'next', 'random'].indexOf(nav) === -1) {
        showError('Invalid <code>nav</code> value. Use <code>prev</code>, <code>next</code>, or <code>random</code>.');
        return;
      }

      var members;
      try {
        var res = await fetch('/members.json');
        if (!res.ok) throw new Error(res.status);
        members = await res.json();
      } catch (e) {
        showError('Could not load member data.');
        return;
      }

      if (!Array.isArray(members) || members.length === 0) {
        showError('No members found.');
        return;
      }

      var idx = -1;
      for (var i = 0; i < members.length; i++) {
        try {
          if (new URL(members[i].website).hostname === siteHostname) {
            idx = i;
            break;
          }
        } catch (e) { /* skip malformed entries */ }
      }

      if (idx === -1) {
        showError('Site not found in the webring. Make sure you submitted the correct URL.');
        return;
      }

      var target;
      if (nav === 'prev') {
        target = members[(idx - 1 + members.length) % members.length];
      } else if (nav === 'next') {
        target = members[(idx + 1) % members.length];
      } else {
        var ri;
        do { ri = Math.floor(Math.random() * members.length); }
        while (ri === idx && members.length > 1);
        target = members[ri];
      }

      window.location.replace(target.website);
    })();
  </script>
</body>
</html>
